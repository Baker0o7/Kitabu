name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # allow manual trigger

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install Inter fonts
        run: |
          mkdir -p app/src/main/res/font
          # Download Inter from Google Fonts bunny CDN (open mirror)
          curl -fL "https://fonts.bunny.net/inter/files/inter-latin-400-normal.woff2" -o /tmp/inter400.woff2 || true
          # Use DejaVu as fallback (always available on ubuntu-latest)
          FONT_DIR="/usr/share/fonts/truetype/dejavu"
          cp "$FONT_DIR/DejaVuSans.ttf"      app/src/main/res/font/inter_regular.ttf
          cp "$FONT_DIR/DejaVuSans.ttf"      app/src/main/res/font/inter_medium.ttf
          cp "$FONT_DIR/DejaVuSans-Bold.ttf" app/src/main/res/font/inter_semibold.ttf
          echo "Fonts ready:"
          ls -lh app/src/main/res/font/

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2g"

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/kitabu-v1.0.0.apk
          echo "APK size: $(du -sh dist/kitabu-v1.0.0.apk | cut -f1)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kitabu-apk
          path: dist/kitabu-v1.0.0.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Kitabu ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## 📓 Kitabu ${{ github.ref_name }}

            A full-featured, dark-themed second brain notes app for Android.

            ### ✨ What's inside
            - 📝 Rich Markdown editor with live preview
            - 🔗 Bi-directional `[[wikilinks]]` + backlinks
            - 🌐 Knowledge graph (force-directed, zoomable)
            - 🏷️ Nested tags (`#work/meetings`)
            - 📅 Daily notes + 5 built-in templates
            - 🕓 Version history with restore
            - 🤖 AI Assistant — Gemini Flash (free tier, 1,500 req/day)
            - 🎙️ Voice-to-text input
            - 🔒 Biometric note lock
            - 🎨 8 visual themes (Noir, Midnight, Forest, Crimson, Dusk, Nord, Rose, Slate)

            ### 📲 Install
            1. Download `kitabu-${{ github.ref_name }}.apk` below
            2. Enable **Install from unknown sources** on your device
            3. Open the APK to install

            ### ⚙️ AI Setup (optional)
            Get a **free** Gemini API key at [aistudio.google.com](https://aistudio.google.com/apikey) → paste in ☰ Settings

            ---
            Built with Kotlin · Room · Markwon · Material 3
          files: dist/kitabu-v1.0.0.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # Wipe runner-injected JVM flags globally — prevents "-Xmx64m ClassNotFoundException"
  JAVA_TOOL_OPTIONS: ""

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle wrapper jar (official action — no manual bootstrap) ─────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ── 4. Android SDK path ───────────────────────────────────────────────
      - name: Write local.properties
        run: printf 'sdk.dir=%s\n' "$ANDROID_HOME" > local.properties

      # ── 5. Accept ALL SDK licences ────────────────────────────────────────
      - name: Accept SDK licences
        run: |
          mkdir -p "$ANDROID_HOME/licenses"
          printf '%s\n' \
            "8933bad161af4178b1185d1a37fbf41ea5269c55" \
            "d56f5187479451eabf01fb78af6dfcb131a6481e" \
            "24333f8a63b6825ea9c5514f83c2829b004d1fee" \
            "84831b9409646a918e30573bab4c9c91346d8abd" \
            > "$ANDROID_HOME/licenses/android-sdk-license"
          printf '%s\n' \
            "d975f751698a77b662f1254ddbeed3901e976f5a" \
            > "$ANDROID_HOME/licenses/android-sdk-preview-license"

      # ── 6. Fonts (DejaVu substitution — metrics close enough for CI) ──────
      - name: Provide fonts
        run: |
          mkdir -p app/src/main/res/font
          D=/usr/share/fonts/truetype/dejavu
          cp "$D/DejaVuSans.ttf"       app/src/main/res/font/inter_regular.ttf
          cp "$D/DejaVuSans.ttf"       app/src/main/res/font/inter_medium.ttf
          cp "$D/DejaVuSans-Bold.ttf"  app/src/main/res/font/inter_semibold.ttf

      # ── 7. Gradle cache ───────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 8. Build ──────────────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:+HeapDumpOnOutOfMemoryError"

      # ── 9. Collect ────────────────────────────────────────────────────────
      - name: Collect APK
        run: |
          TAG="${GITHUB_REF_NAME:-dev-$(date +%Y%m%d)}"
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/kitabu-${TAG}.apk"
          echo "APK_NAME=kitabu-${TAG}.apk" >> "$GITHUB_ENV"
          echo "✅ APK: $(du -sh dist/kitabu-${TAG}.apk | cut -f1)"

      # ── 10. Upload artifact ───────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: dist/${{ env.APK_NAME }}
          retention-days: 30

      # ── 11. GitHub Release (tag pushes only) ─────────────────────────────
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          name: "Kitabu ${{ github.ref_name }}"
          body: |
            ## 📓 Kitabu ${{ github.ref_name }}
            A full-featured dark-themed **second brain** notes app for Android.

            ### ✨ Features
            - 📝 Rich Markdown editor with live preview
            - 🔗 Bi-directional `[[wikilinks]]` + backlinks
            - 🌐 Knowledge graph (force-directed, zoomable)
            - 🏷️ Nested tags (`#work/meetings`)
            - 📅 Daily notes + 5 built-in templates
            - 🕓 Version history with restore
            - 🤖 AI Assistant — Gemini Flash (free, 1,500 req/day)
            - 🎙️ Voice-to-text input
            - 🔒 Biometric note lock
            - 🎨 8 themes: Noir · Midnight · Forest · Crimson · Dusk · Nord · Rose · Slate

            ### 📲 Install
            1. Download **`${{ env.APK_NAME }}`** below
            2. Phone: **Settings → Install unknown apps → Allow**
            3. Tap the APK to install

            ### 🤖 Free AI
            Get a Gemini key at [aistudio.google.com](https://aistudio.google.com/apikey) → ☰ → Settings
          files: dist/${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
